# Production: приложение + Caddy (HTTPS с Let's Encrypt).
# Запуск: docker compose up -d
# Требуется: файл .env в этой папке с одной строкой:
#   RAILS_MASTER_KEY=<содержимое config/master.key, без кавычек и пробелов>

services:
  app:
    build: .
    image: armstrong-quiz
    restart: unless-stopped
    env_file: .env
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - RAILS_ENV=production
    volumes:
      - app_storage:/rails/storage
    # Не публикуем порт — снаружи только Caddy (80/443)

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_AGREE=true
      - ACME_AGREE=true
    depends_on:
      - app

volumes:
  app_storage:
  caddy_data:
  caddy_config:
